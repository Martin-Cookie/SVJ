{% extends "base.html" %}
{% block title %}Zpracování - {{ session.title }} - SVJ Správa{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/dane" class="text-sm text-gray-500 hover:text-gray-700">&larr; Zpět na rozesílání</a>
</div>

<h1 class="text-2xl font-bold text-gray-800 mb-6">{{ session.title }}</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-xl">
    <div id="progress-area"
         hx-get="/dane/{{ session.id }}/zpracovani-stav"
         hx-trigger="every 500ms"
         hx-swap="innerHTML">
        {% include "partials/tax_progress.html" %}
    </div>
</div>
{% endblock %}
