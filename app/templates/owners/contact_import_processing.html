{% extends "base.html" %}
{% block title %}Zpracování kontaktů - SVJ Správa{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-3">
        <a href="/vlastnici/import#kontakty" class="text-sm text-gray-500 hover:text-gray-700">&larr; Zpět na import</a>
    </div>
    <h1 class="text-xl font-bold text-gray-800 mb-4">Import kontaktních údajů</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <div id="progress-area"
             hx-get="/vlastnici/import-kontaktu/zpracovani-stav?soubor={{ file_key|urlencode }}"
             hx-trigger="every 500ms"
             hx-swap="innerHTML">
            {% include "partials/contact_import_progress.html" %}
        </div>
    </div>
</div>
{% endblock %}
