<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ status_code }} - SVJ Správa</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>
    (function(){var s=localStorage.getItem('svj-theme');
    if(s==='dark'||(!s&&matchMedia('(prefers-color-scheme:dark)').matches))
    document.documentElement.classList.add('dark')})();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <p class="text-6xl font-bold text-gray-300 mb-4">{{ status_code }}</p>
        <h1 class="text-xl font-bold text-gray-800 mb-2">{{ title }}</h1>
        <p class="text-sm text-gray-500 mb-6">{{ message }}</p>
        <a href="/" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Zpět na přehled
        </a>
    </div>
</body>
</html>
