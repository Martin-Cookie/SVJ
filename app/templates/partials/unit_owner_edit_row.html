<tr id="owner-row-{{ ou.id }}" class="bg-blue-50">
    <td class="px-3 py-2 text-sm">
        <span class="font-medium text-gray-700">{{ ou.owner.display_name }}</span>
    </td>
    <td class="px-3 py-2">
        <select name="ownership_type" id="otype-edit-{{ ou.id }}"
                class="px-2 py-1 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <option value="">—</option>
            {% for val in ['Výhradní', 'SJM', 'Podílové'] %}
            <option value="{{ val }}" {% if ou.ownership_type == val %}selected{% endif %}>{{ val }}</option>
            {% endfor %}
        </select>
    </td>
    <td class="px-3 py-2 text-right">
        <input type="text" name="share" id="share-edit-{{ ou.id }}" value="{{ ou.share }}"
               pattern="[0-9/.]*" title="Číslo nebo zlomek (např. 1/2)"
               class="w-20 px-2 py-1 text-sm text-right border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </td>
    <td class="px-3 py-2 text-sm text-gray-500 text-right font-mono whitespace-nowrap italic" title="Přepočítá se automaticky">{{ "{:,}".format(ou.votes).replace(",", " ") }}</td>
    <td class="px-3 py-2 text-right whitespace-nowrap">
        <button hx-post="/jednotky/{{ unit.id }}/vlastnik/{{ ou.id }}/upravit"
                hx-include="#share-edit-{{ ou.id }}, #otype-edit-{{ ou.id }}"
                hx-target="#unit-owners" hx-swap="outerHTML"
                class="px-2 py-1 text-xs font-medium text-blue-600 border border-blue-300 rounded hover:bg-blue-50">Uložit</button>
        <button hx-get="/jednotky/{{ unit.id }}/vlastnici-sekce"
                hx-target="#unit-owners" hx-swap="outerHTML"
                class="px-2 py-1 text-xs font-medium text-gray-600 bg-gray-200 rounded-lg hover:bg-gray-300 ml-1">Zrušit</button>
    </td>
</tr>
