<div class="space-y-4">
    <div class="flex justify-between items-center">
        <span class="text-sm font-medium text-gray-700">Zpracování PDF souborů</span>
        <span class="text-sm text-gray-500">{{ current }} / {{ total }}</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
        <div class="bg-blue-600 h-3 rounded-full transition-all duration-300"
             style="width: {{ pct }}%"></div>
    </div>
    <div class="flex justify-between items-center">
        {% if current_file %}
        <p class="text-xs text-gray-400">Zpracovávám: {{ current_file }}</p>
        {% else %}
        <p class="text-xs text-gray-400">Připravuji zpracování...</p>
        {% endif %}
        <div class="text-xs text-gray-400 text-right">
            <span>{{ elapsed }}</span>
            {% if eta %}
            <span class="mx-1">/</span>
            <span class="text-gray-600 font-medium">zbývá {{ eta }}</span>
            {% endif %}
        </div>
    </div>
</div>
