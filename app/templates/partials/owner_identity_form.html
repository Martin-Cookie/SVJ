<h2 class="text-lg font-semibold text-gray-700 mb-4">Identifikace</h2>
<form hx-post="/vlastnici/{{ owner.id }}/identita-upravit" hx-target="#identity-section" hx-swap="innerHTML">
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Typ osoby</label>
            <select name="owner_type" id="identity-owner-type"
                    onchange="toggleIdentityFields(this.value)"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <option value="physical" {% if owner.owner_type.value == 'physical' %}selected{% endif %}>Fyzická osoba</option>
                <option value="legal" {% if owner.owner_type.value == 'legal' %}selected{% endif %}>Právnická osoba</option>
            </select>
        </div>

        {# Physical person fields #}
        <div id="identity-physical-fields" class="space-y-4 {% if owner.owner_type.value == 'legal' %}hidden{% endif %}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Titul</label>
                <input type="text" name="title" value="{{ owner.title or '' }}"
                       placeholder="Ing., Mgr., ..."
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Příjmení</label>
                <input type="text" name="last_name" value="{{ owner.last_name or '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Jméno</label>
                <input type="text" name="first_name_physical" value="{{ owner.first_name or '' if owner.owner_type.value == 'physical' else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rodné číslo</label>
                <input type="text" name="birth_number" value="{{ owner.birth_number or '' }}"
                       placeholder="000000/0000"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        {# Legal entity fields #}
        <div id="identity-legal-fields" class="space-y-4 {% if owner.owner_type.value != 'legal' %}hidden{% endif %}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Název firmy</label>
                <input type="text" name="first_name_legal" value="{{ owner.first_name or '' if owner.owner_type.value == 'legal' else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">IČ</label>
                <input type="text" name="company_id" value="{{ owner.company_id or '' }}"
                       placeholder="12345678"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
                Uložit
            </button>
            <button type="button" hx-get="/vlastnici/{{ owner.id }}/identita-info" hx-target="#identity-section" hx-swap="innerHTML"
                    class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium">
                Zrušit
            </button>
        </div>
    </div>
</form>
<script>
function toggleIdentityFields(val) {
    document.getElementById('identity-physical-fields').classList.toggle('hidden', val === 'legal');
    document.getElementById('identity-legal-fields').classList.toggle('hidden', val !== 'legal');
}
</script>
