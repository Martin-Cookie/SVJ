<div class="bg-white rounded-lg shadow p-4 mb-4">
    <h2 class="text-sm font-semibold text-gray-700 mb-3">Nový vlastník</h2>
    <form hx-post="/vlastnici/novy" hx-target="#owner-create-section" hx-swap="innerHTML">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Příjmení *</label>
                <input type="text" name="last_name" required
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Jméno *</label>
                <input type="text" name="first_name" required
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Titul</label>
                <input type="text" name="title"
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Typ</label>
                <select name="owner_type" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                    <option value="physical">Fyzická osoba</option>
                    <option value="legal">Právnická osoba</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Email</label>
                <input type="email" name="email"
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Telefon</label>
                <input type="text" name="phone"
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">RČ / IČ</label>
                <input type="text" name="birth_number"
                       class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        {% if error %}
        <p role="alert" class="text-sm text-red-600 mb-2">{{ error }}</p>
        {% endif %}
        <div class="flex items-center gap-2">
            <button type="submit" class="px-3 py-1.5 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium transition-colors">
                Vytvořit
            </button>
            <button type="button" onclick="document.getElementById('owner-create-section').innerHTML=''"
                    class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium">
                Zrušit
            </button>
        </div>
    </form>
</div>
