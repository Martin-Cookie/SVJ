<form hx-post="/jednotky/{{ unit.id }}/upravit" hx-target="#unit-edit-form" hx-swap="innerHTML">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-700">Základní údaje</h2>
        <div class="flex items-center gap-2">
            <button type="submit" class="px-3 py-1.5 text-sm font-medium text-blue-600 border border-blue-300 rounded-lg hover:bg-blue-50 transition-colors">Uložit</button>
            <button type="button" hx-get="/jednotky/{{ unit.id }}/info" hx-target="#unit-edit-form" hx-swap="innerHTML"
                    class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium">Zrušit</button>
            {% if error %}
            <span role="alert" class="text-sm text-red-600">{{ error }}</span>
            {% endif %}
        </div>
    </div>
    <div class="space-y-3">
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Číslo jednotky *</label>
            <input type="number" name="unit_number" value="{{ unit.unit_number }}" required min="1" max="99999"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Číslo budovy</label>
            <input type="text" name="building_number" value="{{ unit.building_number or '' }}"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Typ prostoru</label>
            <select name="space_type"
                    class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <option value="">—</option>
                {% set _found_st = [] %}
                {% for item in code_lists.space_type %}
                <option value="{{ item.value }}" {% if unit.space_type == item.value %}selected{% endif %}>{{ item.value }}</option>
                {% if unit.space_type == item.value %}{% if _found_st.append(1) %}{% endif %}{% endif %}
                {% endfor %}
                {% if unit.space_type and not _found_st %}
                <option value="{{ unit.space_type }}" selected>{{ unit.space_type }}</option>
                {% endif %}
            </select>
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Sekce</label>
            <select name="section"
                    class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <option value="">—</option>
                {% set _found_sec = [] %}
                {% for item in code_lists.section %}
                <option value="{{ item.value }}" {% if unit.section == item.value %}selected{% endif %}>{{ item.value }}</option>
                {% if unit.section == item.value %}{% if _found_sec.append(1) %}{% endif %}{% endif %}
                {% endfor %}
                {% if unit.section and not _found_sec %}
                <option value="{{ unit.section }}" selected>{{ unit.section }}</option>
                {% endif %}
            </select>
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Orientační číslo</label>
            <input type="number" name="orientation_number" value="{{ unit.orientation_number or '' }}" min="1" max="9999"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Adresa</label>
            <input type="text" name="address" value="{{ unit.address or '' }}"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">List vlastnictví</label>
            <input type="number" name="lv_number" value="{{ unit.lv_number or '' }}" min="1" max="99999"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Počet místností</label>
            <select name="room_count"
                    class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <option value="">—</option>
                {% set _found_rc = [] %}
                {% for item in code_lists.room_count %}
                <option value="{{ item.value }}" {% if unit.room_count == item.value %}selected{% endif %}>{{ item.value }}</option>
                {% if unit.room_count == item.value %}{% if _found_rc.append(1) %}{% endif %}{% endif %}
                {% endfor %}
                {% if unit.room_count and not _found_rc %}
                <option value="{{ unit.room_count }}" selected>{{ unit.room_count }}</option>
                {% endif %}
            </select>
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Plocha (m²)</label>
            <input type="number" name="floor_area" value="{{ unit.floor_area or '' }}" min="0" max="9999" step="0.01"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center">
            <label class="w-36 text-sm font-medium text-gray-700">Podíl SČD</label>
            <input type="number" name="podil_scd" value="{{ unit.podil_scd or '' }}" min="0" max="99999999" step="1"
                   class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
        </div>
    </div>
</form>
