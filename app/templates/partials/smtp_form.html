<form hx-post="/nastaveni/smtp" hx-target="#smtp-section" hx-swap="innerHTML">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-700">SMTP nastavení emailu</h2>
        <div class="flex items-center gap-2">
            <button type="submit" class="px-3 py-1.5 text-sm font-medium text-blue-600 border border-blue-300 rounded-lg hover:bg-blue-50 transition-colors">Uložit</button>
            <button type="button" hx-get="/nastaveni/smtp/info" hx-target="#smtp-section" hx-swap="innerHTML"
                    class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium">Zrušit</button>
        </div>
    </div>
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SMTP Server</label>
            <input type="text" name="smtp_host" value="{{ settings.smtp_host }}" autofocus
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Port</label>
            <input type="number" name="smtp_port" value="{{ settings.smtp_port }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Uživatel</label>
            <input type="text" name="smtp_user" value="{{ settings.smtp_user }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Heslo</label>
            <input type="password" name="smtp_password"
                   placeholder="{{ '••••••••' if settings.smtp_password else '' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <p class="text-xs text-gray-500 mt-1">Ponechte prázdné pro zachování stávajícího hesla</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Jméno odesílatele</label>
            <input type="text" name="smtp_from_name" value="{{ settings.smtp_from_name }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email odesílatele</label>
            <input type="email" name="smtp_from_email" value="{{ settings.smtp_from_email }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="smtp_use_tls" value="true"
                   {{ 'checked' if settings.smtp_use_tls else '' }}
                   class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
            <span class="text-sm text-gray-700">Použít TLS</span>
        </label>
    </div>
</form>
