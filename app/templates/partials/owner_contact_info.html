<div class="flex items-center justify-between mb-2">
    <h2 class="text-sm font-semibold text-gray-700">Kontakty</h2>
    <div class="flex items-center gap-2">
        {% if saved %}
        <span class="text-xs text-green-600">Uloženo</span>
        {% endif %}
        <button hx-get="/vlastnici/{{ owner.id }}/upravit-formular" hx-target="#contact-form" hx-swap="innerHTML"
                class="inline-flex items-center gap-1 px-2 py-1 text-xs font-medium text-blue-600 border border-blue-300 rounded hover:bg-blue-50 transition-colors">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
            Upravit
        </button>
    </div>
</div>
<div class="space-y-1 text-xs">
    <div class="flex justify-between gap-2">
        <span class="text-gray-500 shrink-0">Email</span>
        <span class="text-gray-900 truncate" title="{{ owner.email or '' }}">{{ owner.email or '—' }}</span>
    </div>
    <div class="flex justify-between gap-2">
        <span class="text-gray-500 shrink-0">Email 2</span>
        <span class="text-gray-900 truncate" title="{{ owner.email_secondary or '' }}">{{ owner.email_secondary or '—' }}</span>
    </div>
    <div class="flex justify-between gap-2">
        <span class="text-gray-500 shrink-0">GSM</span>
        <span class="text-gray-900">{{ owner.phone or '—' }}</span>
    </div>
    <div class="flex justify-between gap-2">
        <span class="text-gray-500 shrink-0">GSM 2</span>
        <span class="text-gray-900">{{ owner.phone_secondary or '—' }}</span>
    </div>
    <div class="flex justify-between gap-2">
        <span class="text-gray-500 shrink-0">Pevný</span>
        <span class="text-gray-900">{{ owner.phone_landline or '—' }}</span>
    </div>
</div>
