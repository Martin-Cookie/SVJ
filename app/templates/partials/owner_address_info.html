<div class="space-y-2 text-sm">
    <div class="flex justify-between">
        <dt class="text-gray-500">Ulice</dt>
        <dd class="text-gray-900">{{ street or '—' }}</dd>
    </div>
    <div class="flex justify-between">
        <dt class="text-gray-500">Část obce</dt>
        <dd class="text-gray-900">{{ district or '—' }}</dd>
    </div>
    <div class="flex justify-between">
        <dt class="text-gray-500">Město</dt>
        <dd class="text-gray-900">{{ city or '—' }}</dd>
    </div>
    <div class="flex justify-between">
        <dt class="text-gray-500">PSČ</dt>
        <dd class="text-gray-900">{{ zip or '—' }}</dd>
    </div>
    <div class="flex justify-between">
        <dt class="text-gray-500">Země</dt>
        <dd class="text-gray-900">{{ country or '—' }}</dd>
    </div>
</div>
<div class="mt-3 flex items-center justify-end gap-2">
    {% if saved %}
    <span class="text-sm text-green-600">Uloženo</span>
    {% endif %}
    <button hx-get="/vlastnici/{{ owner.id }}/adresa/{{ prefix }}/upravit-formular" hx-target="#{{ prefix }}-address-section" hx-swap="innerHTML"
            class="inline-flex items-center gap-1 px-3 py-1.5 text-sm text-gray-600 hover:text-blue-600 border border-gray-300 rounded-lg hover:border-blue-300 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
        Upravit
    </button>
</div>
