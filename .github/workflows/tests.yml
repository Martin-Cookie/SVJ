name: Testy

on:
  push:
    branches: [main, Platby]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: |
          pip install --upgrade pip
          pip install pytest httpx
          pip install fastapi uvicorn jinja2 python-multipart sqlalchemy pydantic-settings openpyxl python-docx docxtpl pdfplumber pytesseract Pillow python-dotenv

      - name: Spuštění testů
        run: python -m pytest tests/ -v --tb=short
